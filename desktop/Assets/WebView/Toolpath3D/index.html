<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toolpath 3D</title>
  <style>
    :root {
      color-scheme: light dark;
      --viewer-bg: #e9eef4;
      --viewer-fg: #52606d;
      --viewer-overlay: #7a8794;
      --viewer-overlay-start: rgba(233, 238, 244, 0.22);
      --viewer-overlay-end: rgba(233, 238, 244, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --viewer-bg: #161616;
        --viewer-fg: #b8c0cc;
        --viewer-overlay: #7c8694;
        --viewer-overlay-start: rgba(22, 22, 22, 0.22);
        --viewer-overlay-end: rgba(22, 22, 22, 0.1);
      }
    }

    :root[data-viewer-theme="light"] {
      --viewer-bg: #e9eef4;
      --viewer-fg: #52606d;
      --viewer-overlay: #7a8794;
      --viewer-overlay-start: rgba(233, 238, 244, 0.22);
      --viewer-overlay-end: rgba(233, 238, 244, 0.1);
    }

    :root[data-viewer-theme="dark"] {
      --viewer-bg: #161616;
      --viewer-fg: #b8c0cc;
      --viewer-overlay: #7c8694;
      --viewer-overlay-start: rgba(22, 22, 22, 0.22);
      --viewer-overlay-end: rgba(22, 22, 22, 0.1);
    }

    html, body, #app {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--viewer-bg);
      color: var(--viewer-fg);
      font-family: Inter, Segoe UI, sans-serif;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: linear-gradient(180deg, var(--viewer-overlay-start), var(--viewer-overlay-end));
    }

    #overlay-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--viewer-bg) 80%, transparent);
      border: 1px solid color-mix(in srgb, var(--viewer-overlay) 22%, transparent);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    #overlay[data-state="empty"] #overlay-panel {
      border-radius: 10px;
      padding: 12px 16px;
    }

    #overlay-spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--viewer-overlay) 28%, transparent);
      border-top-color: var(--viewer-overlay);
      animation: viewer-spin 0.9s linear infinite;
      flex: 0 0 auto;
    }

    #overlay[data-state="empty"] #overlay-spinner {
      display: none;
    }

    #overlay-text {
      font-size: 13px;
      letter-spacing: 0.02em;
      color: var(--viewer-overlay);
    }

    @keyframes viewer-spin {
      to {
        transform: rotate(360deg);
      }
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay" data-state="loading">
    <div id="overlay-panel">
      <div id="overlay-spinner" aria-hidden="true"></div>
      <div id="overlay-text">Loading 3D preview...</div>
    </div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
  </script>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
