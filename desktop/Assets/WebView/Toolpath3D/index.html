<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toolpath 3D</title>
  <style>
    :root {
      color-scheme: light dark;
      --viewer-bg: #e9eef4;
      --viewer-fg: #52606d;
      --viewer-overlay: #7a8794;
      --viewer-overlay-start: rgba(233, 238, 244, 0.22);
      --viewer-overlay-end: rgba(233, 238, 244, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --viewer-bg: #161616;
        --viewer-fg: #b8c0cc;
        --viewer-overlay: #7c8694;
        --viewer-overlay-start: rgba(22, 22, 22, 0.22);
        --viewer-overlay-end: rgba(22, 22, 22, 0.1);
      }
    }

    :root[data-viewer-theme="light"] {
      --viewer-bg: #e9eef4;
      --viewer-fg: #52606d;
      --viewer-overlay: #7a8794;
      --viewer-overlay-start: rgba(233, 238, 244, 0.22);
      --viewer-overlay-end: rgba(233, 238, 244, 0.1);
    }

    :root[data-viewer-theme="dark"] {
      --viewer-bg: #161616;
      --viewer-fg: #b8c0cc;
      --viewer-overlay: #7c8694;
      --viewer-overlay-start: rgba(22, 22, 22, 0.22);
      --viewer-overlay-end: rgba(22, 22, 22, 0.1);
    }

    html, body, #app {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--viewer-bg);
      color: var(--viewer-fg);
      font-family: Inter, Segoe UI, sans-serif;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-size: 13px;
      letter-spacing: 0.02em;
      color: var(--viewer-overlay);
      background: linear-gradient(180deg, var(--viewer-overlay-start), var(--viewer-overlay-end));
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay">Select a G-code file to build the 3D preview.</div>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
  </script>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
